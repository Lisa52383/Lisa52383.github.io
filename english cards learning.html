<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>pink cards — элегантное изучение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fff0f5 0%, #ffe4ec 100%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-weight: 320;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            max-width: 560px;
            width: 100%;
            margin: 0 auto;
        }

        /* хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 32px;
            padding: 0 6px;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 340;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #db2777, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .level-badge {
            font-size: 0.7rem;
            font-weight: 350;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 40px;
            color: #be185d;
            letter-spacing: 0.3px;
            border: 0.5px solid rgba(219, 39, 119, 0.2);
        }

        /* уровни — стеклянные кнопки */
        .levels {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .level-btn {
            flex: 1;
            min-width: 62px;
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(219, 39, 119, 0.15);
            padding: 8px 0;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 340;
            letter-spacing: 0.5px;
            color: #9d174d;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .level-btn.active {
            background: #fbcfe8;
            color: #be185d;
            font-weight: 380;
            border-color: #f472b6;
            box-shadow: 0 2px 8px rgba(219, 39, 119, 0.12);
        }

        /* карточка — элегантная, с мягкой тенью */
        .card-wrapper {
            perspective: 1400px;
            margin: 8px 0 28px;
            cursor: pointer;
        }

        .card {
            position: relative;
            width: 100%;
            min-height: 380px;
            transition: transform 0.55s cubic-bezier(0.23, 0.98, 0.32, 1.02);
            transform-style: preserve-3d;
            border-radius: 44px;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            min-height: 380px;
            backface-visibility: hidden;
            border-radius: 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 36px 24px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 35px -12px rgba(219, 39, 119, 0.12);
            border: 0.5px solid rgba(244, 114, 182, 0.25);
        }

        .card-front {
            transform: rotateY(0deg);
            background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(255,248,250,0.96));
        }

        .card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #fff5f9, #fff0f8);
        }

        .word {
            font-size: 2.9rem;
            font-weight: 360;
            letter-spacing: -0.3px;
            color: #831843;
            margin-bottom: 20px;
            text-align: center;
            word-break: break-word;
        }

        .translation {
            font-size: 2rem;
            font-weight: 340;
            color: #db2777;
            margin: 12px 0;
            text-align: center;
        }

        .assoc {
            font-size: 3.5rem;
            margin-top: 16px;
            filter: drop-shadow(0 2px 6px rgba(219,39,119,0.1));
            animation: gentleFloat 2s ease-in-out infinite;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .flip-hint {
            font-size: 0.65rem;
            font-weight: 300;
            color: #f9a8d4;
            margin-top: 28px;
            display: flex;
            gap: 8px;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        /* кнопки — нежные */
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0 28px;
            flex-wrap: wrap;
        }

        button {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(219, 39, 119, 0.25);
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 330;
            font-family: inherit;
            color: #9d174d;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        button:active {
            transform: scale(0.95);
            background: #fce7f3;
        }

        .btn-know {
            background: #fdf2f8;
            border-color: #f472b6;
            color: #be185d;
            font-weight: 360;
        }

        /* форма добавления — минималистичная */
        .add-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 20px 18px;
            margin: 12px 0 20px;
            border: 0.5px solid rgba(244, 114, 182, 0.3);
        }

        .add-title {
            font-size: 0.7rem;
            font-weight: 340;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ec489a;
            margin-bottom: 14px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        input, select {
            flex: 1;
            padding: 12px 16px;
            border: 0.5px solid rgba(219, 39, 119, 0.25);
            border-radius: 48px;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 320;
            background: rgba(255, 255, 255, 0.9);
            color: #4a044e;
            transition: 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #f472b6;
            background: white;
        }

        /* статистика */
        .stats {
            display: flex;
            justify-content: space-between;
            padding: 12px 18px;
            background: rgba(255, 240, 245, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 320;
            color: #be185d;
            margin-top: 12px;
            border: 0.5px solid rgba(244, 114, 182, 0.2);
        }

        .stats strong {
            font-weight: 400;
            color: #db2777;
        }

        footer {
            text-align: center;
            font-size: 0.58rem;
            font-weight: 300;
            color: #f9a8d4;
            margin-top: 20px;
            letter-spacing: 0.4px;
        }

        @media (max-width: 520px) {
            .word { font-size: 2rem; }
            .translation { font-size: 1.5rem; }
            .card-front, .card-back { min-height: 320px; }
            .level-btn { font-size: 0.65rem; min-width: 52px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>🌸 pink cards</h1>
        <div class="level-badge" id="levelBadge">A1 · начальный</div>
    </div>

    <div class="levels" id="levelButtons">
        <button class="level-btn" data-level="A1">A1</button>
        <button class="level-btn" data-level="A2">A2</button>
        <button class="level-btn" data-level="B1">B1</button>
        <button class="level-btn" data-level="B2">B2</button>
        <button class="level-btn" data-level="C1">C1</button>
    </div>

    <div class="card-wrapper" id="cardWrapper">
        <div class="card" id="card">
            <div class="card-front">
                <div class="word" id="frontWord">word</div>
                <div class="flip-hint">
                    <span>✧ нажми ✧</span>
                </div>
            </div>
            <div class="card-back">
                <div class="translation" id="backTranslation">перевод</div>
                <div class="assoc" id="assocEmoji">🌸</div>
                <div class="flip-hint">✧ ассоциация ✧</div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button id="prevBtn">◀ prev</button>
        <button id="knowBtn" class="btn-know">✓ знаю</button>
        <button id="dontKnowBtn">↻ повтор</button>
        <button id="nextBtn">next ▶</button>
    </div>

    <div class="add-panel">
        <div class="add-title">+ новое слово</div>
        <div class="input-row">
            <input type="text" id="newWord" placeholder="английское слово" autocomplete="off">
            <input type="text" id="newTrans" placeholder="перевод" autocomplete="off">
        </div>
        <div class="input-row">
            <input type="text" id="newEmoji" placeholder="🎀 эмодзи (оставь пустым для случайного)" autocomplete="off">
            <select id="newLevel">
                <option value="A1">A1</option>
                <option value="A2">A2</option>
                <option value="B1" selected>B1</option>
                <option value="B2">B2</option>
                <option value="C1">C1</option>
            </select>
            <button id="addWordBtn" style="background:#fce7f3;">✨ добавить</button>
        </div>
    </div>

    <div class="stats" id="statsPanel">
        <span>📖 в уровне: <strong id="totalCount">0</strong></span>
        <span>💗 выучено: <strong id="learnedCount">0</strong></span>
        <span>🔄 на повтор: <strong id="reviewCount">0</strong></span>
    </div>
    <footer>tap card · ← → · пробел переворот · enter = знаю</footer>
</div>

<script>
    // ---------- БОЛЬШАЯ БИБЛИОТЕКА РАНДОМНЫХ ЭМОДЗИ-АССОЦИАЦИЙ ----------
    const emojiLibrary = [
        "🌸", "🌺", "🦋", "🐇", "⭐", "✨", "💖", "🍰", "🎀", "🕊️", "🍃", "🌙", 
        "💫", "🍬", "🐚", "🧸", "🍒", "🎈", "💝", "🌼", "🪶", "☁️", "🍭", "🐩",
        "🎐", "🧁", "🍓", "🐝", "🪷", "🐰", "💗", "🍑", "🦢", "🌷", "🕯️", "🧚"
    ];

    function getRandomEmoji() {
        return emojiLibrary[Math.floor(Math.random() * emojiLibrary.length)];
    }

    // ---------- БАЗА ДАННЫХ ----------
    let words = [
        { id: 1, word: "apple", translation: "яблоко", level: "A1", mastered: false, repeatPenalty: 0, emoji: "🍎" },
        { id: 2, word: "house", translation: "дом", level: "A1", mastered: false, repeatPenalty: 0, emoji: "🏠" },
        { id: 3, word: "beautiful", translation: "красивый", level: "A2", mastered: false, repeatPenalty: 0, emoji: "🌸" },
        { id: 4, word: "quickly", translation: "быстро", level: "A2", mastered: false, repeatPenalty: 0, emoji: "⚡" },
        { id: 5, word: "adventure", translation: "приключение", level: "B1", mastered: false, repeatPenalty: 0, emoji: "✨" },
        { id: 6, word: "enormous", translation: "огромный", level: "B1", mastered: false, repeatPenalty: 0, emoji: "🐘" },
        { id: 7, word: "nevertheless", translation: "тем не менее", level: "B2", mastered: false, repeatPenalty: 0, emoji: "🌙" },
        { id: 8, word: "sophisticated", translation: "утонченный", level: "C1", mastered: false, repeatPenalty: 0, emoji: "🎀" }
    ];

    let currentLevel = "A1";
    let currentIndex = 0;
    let isFlipped = false;
    let currentLevelWords = [];

    // ---------- СОХРАНЕНИЕ ----------
    function saveToLocal() {
        localStorage.setItem("pinkcards_words_v2", JSON.stringify(words));
        localStorage.setItem("pinkcards_level_v2", currentLevel);
    }

    function loadFromLocal() {
        const savedWords = localStorage.getItem("pinkcards_words_v2");
        if (savedWords) {
            try {
                const parsed = JSON.parse(savedWords);
                if (parsed.length) words = parsed;
            } catch(e) {}
        }
        const savedLevel = localStorage.getItem("pinkcards_level_v2");
        if (savedLevel && ["A1","A2","B1","B2","C1"].includes(savedLevel)) {
            currentLevel = savedLevel;
        }
    }

    function updateCurrentLevelList() {
        let filtered = words.filter(w => w.level === currentLevel);
        currentLevelWords = [...filtered].sort((a,b) => (b.repeatPenalty || 0) - (a.repeatPenalty || 0));
        if (currentIndex >= currentLevelWords.length) currentIndex = 0;
        if (currentLevelWords.length === 0) currentIndex = 0;
    }

    function renderCard() {
        if (currentLevelWords.length === 0) {
            document.getElementById("frontWord").innerText = "✨ add words";
            document.getElementById("backTranslation").innerText = "добавь слова";
            document.getElementById("assocEmoji").innerHTML = "🌸";
            return;
        }
        const card = currentLevelWords[currentIndex];
        document.getElementById("frontWord").innerText = card.word;
        document.getElementById("backTranslation").innerHTML = `${card.translation}`;
        document.getElementById("assocEmoji").innerHTML = card.emoji || getRandomEmoji();
        
        if (isFlipped) {
            document.getElementById("card").classList.remove("flipped");
            isFlipped = false;
        }
        updateStatsUI();
    }

    function flipCard() {
        if (currentLevelWords.length === 0) return;
        document.getElementById("card").classList.toggle("flipped");
        isFlipped = !isFlipped;
    }

    // ---------- МЕХАНИКА ПРОГРЕССА ----------
    function markAsKnown() {
        if (currentLevelWords.length === 0) return;
        const currentWordObj = currentLevelWords[currentIndex];
        const original = words.find(w => w.id === currentWordObj.id);
        if (!original) return;
        
        const levelOrder = ["A1", "A2", "B1", "B2", "C1"];
        const idx = levelOrder.indexOf(original.level);
        
        if (idx < levelOrder.length - 1) {
            original.level = levelOrder[idx + 1];
            original.repeatPenalty = 0;
            original.mastered = false;
        } else {
            if (!original.mastered) {
                original.mastered = true;
                original.repeatPenalty = 0;
            }
        }
        
        saveToLocal();
        moveToNextAfterAction();
    }

    function markAsDontKnow() {
        if (currentLevelWords.length === 0) return;
        const currentWordObj = currentLevelWords[currentIndex];
        const original = words.find(w => w.id === currentWordObj.id);
        if (!original) return;
        
        original.repeatPenalty = (original.repeatPenalty || 0) + 1;
        original.mastered = false;
        
        const levelOrder = ["A1", "A2", "B1", "B2", "C1"];
        let idx = levelOrder.indexOf(original.level);
        if (original.repeatPenalty >= 3 && idx > 0) {
            original.level = levelOrder[idx - 1];
            original.repeatPenalty = 0;
        }
        
        saveToLocal();
        moveToNextAfterAction();
    }
    
    function moveToNextAfterAction() {
        updateCurrentLevelList();
        if (currentLevelWords.length > 0) {
            if (currentIndex >= currentLevelWords.length) currentIndex = 0;
            renderCard();
        } else {
            renderCard();
        }
        updateStatsUI();
    }

    function nextCard() {
        if (currentLevelWords.length === 0) return;
        currentIndex = (currentIndex + 1) % currentLevelWords.length;
        renderCard();
    }
    
    function prevCard() {
        if (currentLevelWords.length === 0) return;
        currentIndex = (currentIndex - 1 + currentLevelWords.length) % currentLevelWords.length;
        renderCard();
    }
    
    function changeLevel(level) {
        currentLevel = level;
        saveToLocal();
        currentIndex = 0;
        updateCurrentLevelList();
        renderCard();
        
        document.querySelectorAll(".level-btn").forEach(btn => {
            if (btn.getAttribute("data-level") === level) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
        updateStatsUI();
    }
    
    function updateStatsUI() {
        const levelWords = words.filter(w => w.level === currentLevel);
        const total = levelWords.length;
        const masteredCount = levelWords.filter(w => w.mastered === true).length;
        const repeatCount = levelWords.filter(w => (w.repeatPenalty || 0) > 0).length;
        document.getElementById("totalCount").innerText = total;
        document.getElementById("learnedCount").innerText = masteredCount;
        document.getElementById("reviewCount").innerText = repeatCount;
        
        const levelNames = { A1:"A1 · начальный", A2:"A2 · базовый", B1:"B1 · средний", B2:"B2 · выше среднего", C1:"C1 · продвинутый" };
        document.getElementById("levelBadge").innerHTML = levelNames[currentLevel] || currentLevel;
    }
    
    // ---------- ДОБАВЛЕНИЕ СЛОВА СО СЛУЧАЙНЫМ ЭМОДЗИ ----------
    function addNewWord() {
        const word = document.getElementById("newWord").value.trim();
        const translation = document.getElementById("newTrans").value.trim();
        let userEmoji = document.getElementById("newEmoji").value.trim();
        const level = document.getElementById("newLevel").value;
        
        if (!word || !translation) {
            alert("введите слово и перевод 💕");
            return;
        }
        
        // если пользователь не указал эмодзи — берём случайный
        let finalEmoji = userEmoji;
        if (!finalEmoji) {
            finalEmoji = getRandomEmoji();
        }
        
        const newId = Date.now();
        words.push({
            id: newId,
            word: word,
            translation: translation,
            level: level,
            mastered: false,
            repeatPenalty: 0,
            emoji: finalEmoji
        });
        
        saveToLocal();
        
        document.getElementById("newWord").value = "";
        document.getElementById("newTrans").value = "";
        document.getElementById("newEmoji").value = "";
        
        if (level === currentLevel) {
            updateCurrentLevelList();
            renderCard();
        }
        updateStatsUI();
    }
    
    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    loadFromLocal();
    updateCurrentLevelList();
    
    document.getElementById("cardWrapper").addEventListener("click", flipCard);
    document.getElementById("knowBtn").addEventListener("click", markAsKnown);
    document.getElementById("dontKnowBtn").addEventListener("click", markAsDontKnow);
    document.getElementById("nextBtn").addEventListener("click", nextCard);
    document.getElementById("prevBtn").addEventListener("click", prevCard);
    document.getElementById("addWordBtn").addEventListener("click", addNewWord);
    
    document.querySelectorAll(".level-btn").forEach(btn => {
        btn.addEventListener("click", (e) => {
            changeLevel(btn.getAttribute("data-level"));
        });
    });
    
    document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") prevCard();
        if (e.key === "ArrowRight") nextCard();
        if (e.key === " " || e.key === "Space") {
            e.preventDefault();
            flipCard();
        }
        if (e.key === "Enter" && document.activeElement !== document.getElementById("newWord") && 
            document.activeElement !== document.getElementById("newTrans") &&
            document.activeElement !== document.getElementById("newEmoji")) {
            e.preventDefault();
            markAsKnown();
        }
    });
    
    changeLevel(currentLevel);
</script>
</body>
</html>
